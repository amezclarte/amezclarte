<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap');
:root{--bg:#0a0a0a;--sur:#141414;--sur2:#1e1e1e;--sur3:#282828;--b:#2a2a2a;--b2:#3a3a3a;--gold:#c9a86c;--gold2:#a07840;--gold3:#e8c98a;--txt:#f2ede4;--muted:#888;--dim:#444;--green:#4caf7d;--red:#e05555;--yel:#e0b84e;--blue:#5b9cf6;--r:16px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s;}
#splash img{width:110px;height:110px;border-radius:50%;object-fit:cover;box-shadow:0 0 40px rgba(201,168,108,.35);}
#splash h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);letter-spacing:3px;margin-top:18px;text-transform:uppercase;}
#splash p{color:var(--muted);font-size:.75rem;margin-top:5px;letter-spacing:4px;text-transform:uppercase;}
.sbar{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-top:28px;animation:sh 1.5s infinite;}
@keyframes sh{0%,100%{opacity:.3}50%{opacity:1}}
.page{display:none;padding-bottom:85px;min-height:100vh;}.page.active{display:block;}
.ph{padding:50px 20px 16px;background:linear-gradient(180deg,rgba(201,168,108,.07) 0%,transparent 100%);border-bottom:1px solid var(--b);}
.ph-row{display:flex;align-items:center;gap:12px;}.ph-logo{width:34px;height:34px;border-radius:50%;object-fit:cover;}
.ph h2{font-family:'Playfair Display',serif;font-size:1.4rem;}.ph p{color:var(--muted);font-size:10px;margin-top:3px;letter-spacing:1px;text-transform:uppercase;}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,10,.97);backdrop-filter:blur(16px);border-top:1px solid var(--b);display:flex;z-index:100;padding:6px 0 max(6px,env(safe-area-inset-bottom));}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;background:none;border:none;cursor:pointer;color:var(--dim);font-family:'Inter',sans-serif;font-size:9px;transition:color .2s;letter-spacing:.5px;text-transform:uppercase;}
.nb.active{color:var(--gold);}.nb svg{width:20px;height:20px;stroke-width:1.5;}
.cw{padding:14px 16px 8px;}.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cm{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);}
.cnb{background:none;border:1px solid var(--b2);border-radius:8px;color:var(--muted);width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;}
.cnb:hover{border-color:var(--gold);color:var(--gold);}
.cwk{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;}
.cwd{text-align:center;font-size:10px;color:var(--dim);padding:3px 0;text-transform:uppercase;}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;font-size:13px;position:relative;transition:all .15s;border:1px solid transparent;color:var(--muted);}
.cd:hover{background:var(--sur2);color:var(--txt);}.cd.today{border-color:var(--gold);color:var(--gold);font-weight:600;}
.cd.selected{background:var(--gold);color:#0a0a0a;font-weight:700;border-color:var(--gold);}
.cd.has-event::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--gold2);}
.cd.selected::after{background:#0a0a0a;}.cd.empty{pointer-events:none;opacity:0;}
.day-panel{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);margin:12px 16px;overflow:hidden;}
.day-panel-header{padding:12px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;}
.day-panel-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);}
.day-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;padding:2px 6px;}
.act-item{padding:12px 14px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .15s;}
.act-item:last-child{border-bottom:none;}.act-item:hover{background:var(--sur2);}
.act-item-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.act-name{font-weight:600;font-size:14px;}.act-note{font-size:12px;color:var(--muted);margin-top:4px;}
.act-pp{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.mini-badge{padding:2px 8px;border-radius:20px;font-size:10px;background:var(--sur3);color:var(--muted);border:1px solid var(--b2);}
.sess-detail{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);margin:12px 16px;overflow:hidden;}
.sess-detail-header{padding:14px;border-bottom:1px solid var(--b);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.sess-detail-info{flex:1;}.sess-title{font-family:'Playfair Display',serif;font-size:1.1rem;}
.sess-meta{font-size:11px;color:var(--muted);margin-top:4px;}
.sess-note{font-size:12px;color:var(--muted);padding:10px 12px;background:var(--sur2);border-radius:8px;}
.sess-actions{display:flex;gap:6px;flex-shrink:0;}
.ib{background:none;border:1px solid var(--b2);border-radius:8px;color:var(--muted);width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ib:hover{border-color:var(--gold);color:var(--gold);}.ib.del:hover{border-color:var(--red);color:var(--red);}
.pr{padding:10px 13px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .15s;}
.pr:last-child{border-bottom:none;}.pr:hover{background:var(--sur2);}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#0a0a0a;flex-shrink:0;}
.pi{flex:1;min-width:0;}.pn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pp2{font-size:11px;color:var(--muted);}
.pb{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.paid{background:rgba(76,175,125,.15);color:var(--green);border:1px solid rgba(76,175,125,.3);}
.pending{background:rgba(224,184,78,.15);color:var(--yel);border:1px solid rgba(224,184,78,.3);}
.nopay{background:rgba(224,85,85,.15);color:var(--red);border:1px solid rgba(224,85,85,.3);}
.partial{background:rgba(91,156,246,.15);color:var(--blue);border:1px solid rgba(91,156,246,.3);}
.apr{padding:10px 13px;display:flex;align-items:center;gap:8px;color:var(--dim);font-size:13px;cursor:pointer;transition:all .15s;}
.apr:hover{color:var(--gold);background:rgba(201,168,108,.05);}
.e-tabs-bar{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--b);}
.bc{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--b);overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
.bc::-webkit-scrollbar{display:none;}.bci{cursor:pointer;transition:color .2s;flex-shrink:0;}
.bci:hover,.bci.active{color:var(--gold);}.bcs{color:var(--b2);flex-shrink:0;}
.bg2c{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;}
.bcard{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);padding:14px 12px;cursor:pointer;transition:all .2s;text-align:center;overflow:hidden;}
.bcard:hover{border-color:var(--gold);background:rgba(201,168,108,.05);transform:scale(1.02);}
.bcard-logo{width:100%;height:65px;object-fit:contain;margin-bottom:8px;border-radius:6px;background:#fff;padding:4px;}
.bcn{font-weight:600;font-size:13px;}.bcc{font-size:11px;color:var(--muted);margin-top:4px;}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 16px 16px;}
.ec{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s;position:relative;}
.ec:hover{border-color:var(--gold);transform:scale(1.02);}
.et{width:100%;aspect-ratio:1;background:var(--sur2);display:flex;align-items:center;justify-content:center;font-size:2.5rem;overflow:hidden;}
.et img{width:100%;height:100%;object-fit:cover;}.ei2{padding:10px;}
.en{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.es2{font-size:10px;color:var(--muted);margin-top:2px;}
.ebadge{position:absolute;top:7px;right:7px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;}
.fsc{background:rgba(76,175,125,.88);color:#fff;}.nfs{background:rgba(224,85,85,.88);color:#fff;}
.fdot{position:absolute;top:7px;left:7px;background:rgba(201,168,108,.85);color:#0a0a0a;padding:2px 6px;border-radius:20px;font-size:9px;font-weight:700;}
.aec{background:var(--sur);border:2px dashed var(--b2);border-radius:var(--r);aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--dim);font-size:12px;gap:8px;}
.aec:hover{border-color:var(--gold);color:var(--gold);}
/* Photo slots - NO absolute input, toque va al slot entero via JS */
.photo-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px;}
.photo-slot{border:2px dashed var(--b2);border-radius:10px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;overflow:hidden;position:relative;}
.photo-slot:hover{border-color:var(--gold);}
.ph-ico{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;pointer-events:none;}
.ph-ico span{font-size:9px;color:var(--dim);}
.rm-photo{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(224,85,85,.9);color:#fff;border:none;cursor:pointer;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;}
/* photo upload btn for combo */
.photo-upload-btn{width:100%;border:2px dashed var(--b2);border-radius:12px;padding:16px;display:flex;align-items:center;justify-content:center;gap:10px;background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.photo-upload-btn:hover{border-color:var(--gold);color:var(--gold);}
.photo-preview-wrap{position:relative;margin-bottom:4px;}
.photo-preview-wrap img{width:100%;max-height:160px;object-fit:cover;border-radius:10px;display:block;}
.photo-preview-wrap .rm-photo-full{position:absolute;top:6px;right:6px;background:rgba(224,85,85,.9);color:#fff;border:none;border-radius:20px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;}
.fin-summary{margin:16px;background:var(--sur);border:1px solid var(--b);border-radius:var(--r);padding:16px;}
.fin-summary-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b);}
.fin-row:last-child{border-bottom:none;}.fin-label{font-size:13px;color:var(--muted);}
.fin-val{font-size:15px;font-weight:600;}.fin-val.pos{color:var(--green);}.fin-val.neg{color:var(--red);}.fin-val.neu{color:var(--gold);}
.fin-tabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;}
.fin-tabs::-webkit-scrollbar{display:none;}
.ftab{padding:7px 16px;border-radius:20px;border:1px solid var(--b);background:none;color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:all .2s;}
.ftab.active{background:var(--gold);color:#0a0a0a;border-color:var(--gold);font-weight:600;}
.fin-list{padding:0 16px;}
.fin-item{background:var(--sur);border:1px solid var(--b);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s;}
.fin-item:hover{background:var(--sur2);}
.fin-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.fin-icon.ing{background:rgba(76,175,125,.15);}.fin-icon.gas{background:rgba(224,85,85,.15);}
.fin-info{flex:1;min-width:0;}
.fin-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fin-date{font-size:11px;color:var(--muted);margin-top:2px;}
.fin-amount{font-size:15px;font-weight:600;flex-shrink:0;}.fin-amount.ing{color:var(--green);}.fin-amount.gas{color:var(--red);}
.fin-mh{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:12px 0 6px;}
.fab{position:fixed;bottom:78px;right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold3),var(--gold));color:#0a0a0a;border:none;cursor:pointer;font-size:1.5rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(201,168,108,.4);z-index:99;transition:all .2s;}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.mo.open{display:flex;}
.modal{background:var(--sur);border-radius:22px 22px 0 0;width:100%;max-width:430px;padding:20px 20px max(20px,env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:su .3s cubic-bezier(.32,.72,0,1);}
@keyframes su{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{width:36px;height:4px;border-radius:2px;background:var(--b2);margin:0 auto 18px;}
.modal h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);margin-bottom:16px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field select,.field textarea{width:100%;background:var(--sur2);border:1px solid var(--b2);border-radius:10px;padding:11px 13px;color:var(--txt);font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
.field select option{background:var(--sur2);}.field textarea{resize:none;min-height:68px;}
.pir{display:flex;gap:6px;align-items:flex-end;margin-bottom:8px;}.pir .field{flex:1;margin-bottom:0;}
.acb,.rmb{flex-shrink:0;width:38px;height:38px;border-radius:9px;border:1px solid var(--b2);background:var(--sur3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.acb{color:var(--gold);}.rmb{color:var(--muted);transition:all .2s;}.rmb:hover{border-color:var(--red);color:var(--red);}
.amb{display:flex;align-items:center;gap:8px;color:var(--gold);font-size:13px;cursor:pointer;padding:6px 0 12px;background:none;border:none;font-family:'Inter',sans-serif;}
.br{display:flex;gap:10px;margin-top:16px;}
.btn{flex:1;padding:13px;border-radius:12px;border:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;}
.bp{background:linear-gradient(135deg,var(--gold3),var(--gold));color:#0a0a0a;}
.bgb{background:none;border:1px solid var(--b2);color:var(--muted);}
.bdr{background:none;border:1px solid var(--red);color:var(--red);}
.btn:hover{opacity:.88;transform:scale(.98);}
.drow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--b);}

.dval{font-size:13px;font-weight:500;text-align:right;max-width:60%;}
.pdh{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--b);}

</style></head><body>

function tallIncomeMonth(mk){let t=0;acts.filter(a=>a.date&&a.date.startsWith(mk)).forEach(a=>{(a.participants||[]).forEach(p=>{if(p.payment==='paid')t+=(a.price||0);else if(p.payment==='partial')t+=(p.abono||0);});});return t;}
function tallIncomeAll(){let t=0;acts.forEach(a=>{(a.participants||[]).forEach(p=>{if(p.payment==='paid')t+=(a.price||0);else if(p.payment==='partial')t+=(p.abono||0);});});return t;}
function totIng(mk){const m=fins.filter(f=>f.type==='ingreso'&&(!mk||f.date.startsWith(mk))).reduce((s,f)=>s+f.amount,0);const t=mk?tallIncomeMonth(mk):tallIncomeAll();return m+t;}
function totGas(mk){return fins.filter(f=>f.type==='gasto'&&(!mk||f.date.startsWith(mk))).reduce((s,f)=>s+f.amount,0);}
function payColor(p){return p==='paid'?'var(--green)':p==='partial'?'var(--blue)':p==='nopay'?'var(--red)':'var(--yel)';}
function payLabel(p){return p==='paid'?'Pagado':p==='partial'?'Parcial':p==='nopay'?'No paga':'Pendiente';}
function payClass(p){return p==='paid'?'paid':p==='partial'?'partial':p==='nopay'?'nopay':'pending';}

/* ===== FOTO HELPERS (sin input absoluto, con FileReader limpio) ===== */
function openEnModal(){
  euImgs=[null,null,null];
  // reset los inputs permanentes
  [0,1,2].forEach(i=>{const el=document.getElementById('fi'+i);if(el)el.value='';});
  document.getElementById('eu-nm').value='';
  document.getElementById('eu-desc').value='';
  renderPhotoSlots();
  OM('m-en');
}
function renderPhotoSlots(){
  const c=document.getElementById('photo-slots');
  c.innerHTML='';
  for(let i=0;i<3;i++){
    const slot=document.createElement('div');
    slot.className='photo-slot';
    slot.id='ps-'+i;
    if(euImgs[i]){
      slot.innerHTML='<img src="'+euImgs[i]+'" style="width:100%;height:100%;object-fit:cover;display:block"><button class="rm-photo" onclick="event.stopPropagation();removePhoto('+i+')">x</button>';
    } else {
      slot.innerHTML='<div class="ph-ico"><div style="font-size:1.6rem">&#128247;</div><span>Foto '+(i+1)+'</span></div>';
    }
    // click dispara el input permanente del DOM
    slot.addEventListener('click',()=>{if(!euImgs[i])document.getElementById('fi'+i).click();});
    c.appendChild(slot);
  }
}
function onPhotoChange(inp,idx){
  if(!inp.files||!inp.files[0])return;
  const r=new FileReader();
  r.onload=e=>{euImgs[idx]=e.target.result;renderPhotoSlots();};
  r.readAsDataURL(inp.files[0]);
}
function removePhoto(idx){euImgs[idx]=null;document.getElementById('fi'+idx).value='';renderPhotoSlots();}

/* combo result photo — usa input permanente fi-combo */
function onComboPhotoChange(inp){
  if(!inp.files||!inp.files[0])return;
  const r=new FileReader();
  r.onload=e=>{
    comboResultImg=e.target.result;
    const wrap=document.getElementById('combo-result-preview');
    const prev=document.getElementById('combo-result-prev');
    prev.src=comboResultImg;wrap.style.display='block';
    document.getElementById('combo-result-ph').style.display='none';
  };
  r.readAsDataURL(inp.files[0]);
}
function removeComboResultPhoto(){
  comboResultImg=null;
  document.getElementById('fi-combo').value='';
  document.getElementById('combo-result-preview').style.display='none';
  document.getElementById('combo-result-ph').style.display='flex';
}

function openActModal(actId=null){editActId=actId;if(actId){const a=acts.find(x=>x.id===actId);document.getElementById('m-act-title').textContent='Editar actividad';document.getElementById('m-act-save-btn').textContent='Guardar cambios';document.getElementById('an').value=a.name;document.getElementById('ad').value=a.date;document.getElementById('at').value=a.time||'10:00';document.getElementById('aprice').value=a.price||'';document.getElementById('anote').value=a.note||'';}else{document.getElementById('m-act-title').textContent='Nueva actividad';document.getElementById('m-act-save-btn').textContent='Crear';document.getElementById('an').value='';document.getElementById('ad').value=selDate||'';document.getElementById('at').value='10:00';document.getElementById('aprice').value='';document.getElementById('anote').value='';}OM('m-act');}
function renderCal(){const y=calD.getFullYear(),m=calD.getMonth();document.getElementById('cal-month').textContent=MONTHS[m]+' '+y;document.getElementById('cal-wk').innerHTML=DAYS.map(d=>'<div class="cwd">'+d+'</div>').join('');const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();const today=new Date(),evDates=new Set(acts.map(a=>a.date));let h='';for(let i=0;i<first;i++)h+='<div class="cd empty"></div>';for(let d=1;d<=dim;d++){const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;const isS=selDate===ds,hasE=evDates.has(ds);h+='<div class="cd'+(isT?' today':'')+(isS?' selected':'')+(hasE?' has-event':'')+'" onclick="selD(\''+ds+'\')">'+d+'</div>';}document.getElementById('cal-grid').innerHTML=h;}
function selD(ds){selDate=(selDate===ds)?null:ds;renderCal();renderDP();}
document.getElementById('cal-prev').addEventListener('click',()=>{calD.setMonth(calD.getMonth()-1);renderCal();});
document.getElementById('cal-next').addEventListener('click',()=>{calD.setMonth(calD.getMonth()+1);renderCal();});
function renderDP(){const c=document.getElementById('day-panel-container');if(!selDate){c.innerHTML='';return;}const da=acts.filter(a=>a.date===selDate);const do_=new Date(selDate+'T12:00:00');const lbl=do_.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});if(!da.length){c.innerHTML='<div class="day-panel"><div class="day-panel-header"><span class="day-panel-title">'+lbl+'</span><button class="day-close" onclick="selD(\''+selDate+'\')">x</button></div><div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Sin actividades. Toca + para crear.</div></div>';return;}let html='<div class="day-panel"><div class="day-panel-header"><span class="day-panel-title" style="text-transform:capitalize">'+lbl+'</span><button class="day-close" onclick="selD(\''+selDate+'\')">x</button></div>';da.forEach(a=>{html+='<div class="act-item" onclick="openSD(\''+a.id+'\')"><div class="act-item-top"><span class="act-name">'+a.name+'</span><div style="display:flex;gap:6px;align-items:center">'+(a.time?'<span style="font-size:11px;color:var(--muted)">'+a.time+'</span>':'')+'<button class="ib" style="width:26px;height:26px" onclick="event.stopPropagation();openActModal(\''+a.id+'\')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></div></div>'+(a.note?'<div class="act-note">'+a.note+'</div>':'')+(a.price?'<div style="font-size:11px;color:var(--gold);margin-top:4px">Precio: '+FMT(a.price)+'</div>':'')+'<div class="act-pp">';const ps=a.participants||[];if(ps.length){ps.forEach(p=>{html+='<span class="mini-badge">'+p.name+' - <span style="color:'+payColor(p.payment)+'">'+payLabel(p.payment)+'</span></span>';});}else{html+='<span class="mini-badge" style="color:var(--dim)">Sin participantes</span>';}html+='</div></div>';});html+='</div>';c.innerHTML=html;}
function openSD(id){curActId=id;const a=acts.find(x=>x.id===id);const do_=new Date(a.date+'T12:00:00');const lbl=do_.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});const ps=a.participants||[];let html='<div class="sess-detail"><div class="sess-detail-header"><div class="sess-detail-info"><div class="sess-title">'+a.name+'</div><div class="sess-meta" style="text-transform:capitalize">'+lbl+(a.time?' - '+a.time:'')+'</div>'+(a.price?'<div style="font-size:12px;color:var(--gold);margin-top:4px">Precio: '+FMT(a.price)+'/persona</div>':'')+(a.note?'<div class="sess-note" style="margin-top:6px">'+a.note+'</div>':'')+'</div><div class="sess-actions"><button class="ib" onclick="openActModal(\''+a.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="ib del" onclick="delAct(\''+a.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button><button class="ib" onclick="renderDP()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button></div></div>';ps.forEach((p,i)=>{html+='<div class="pr" onclick="openPd(\''+a.id+'\','+i+')"><div class="av">'+p.name.charAt(0).toUpperCase()+'</div><div class="pi"><div class="pn">'+p.name+'</div><div class="pp2">'+(p.phone||'')+(p.payment==='partial'&&p.abono?' - Abono: '+FMT(p.abono):'')+'</div></div><span class="pb '+payClass(p.payment)+'">'+payLabel(p.payment)+'</span></div>';});html+='<div class="apr" onclick="openParts(\''+a.id+'\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'+(ps.length?'Gestionar participantes':'Agregar participantes')+'</div></div>';document.getElementById('day-panel-container').innerHTML=html;selDate=a.date;renderCal();}
function saveAct(){const name=document.getElementById('an').value.trim(),date=document.getElementById('ad').value;if(!name){toast('Ingresa el nombre');return;}if(!date){toast('Selecciona fecha');return;}const data={name,date,time:document.getElementById('at').value,price:parseFloat(document.getElementById('aprice').value)||0,note:document.getElementById('anote').value.trim()};if(editActId){Object.assign(acts.find(x=>x.id===editActId),data);toast('Actualizada');}else{acts.push({id:Date.now().toString(),...data,participants:[]});selDate=date;toast('Creada');}sv();CM('m-act');renderCal();renderDP();}
function delAct(id){if(!confirm('Eliminar?'))return;acts=acts.filter(a=>a.id!==id);sv();selDate=null;renderCal();renderDP();toast('Eliminada');}
function openParts(id){curActId=id;pCount=0;const act=acts.find(a=>a.id===id);document.getElementById('p-inputs').innerHTML='';if(act.participants.length)act.participants.forEach(p=>addPI(p.name,p.phone));else addPI();document.getElementById('bulk-pay').value=act.participants[0]?.payment||'pending';OM('m-parts');}
function addPI(name='',phone=''){pCount++;const idx=pCount;const c=document.getElementById('p-inputs');const d=document.createElement('div');d.className='pir';d.id='pr-'+idx;d.innerHTML='<div class="field"><label>Nombre</label><input type="text" id="pn-'+idx+'" value="'+name+'" placeholder="Nombre"></div><div class="field"><label>Celular</label><input type="tel" id="pp-'+idx+'" value="'+phone+'" placeholder="+56 9..."></div><button class="acb" onclick="addC('+idx+')">&#128100;</button>'+(idx>1?'<button class="rmb" onclick="rmPI('+idx+')">x</button>':'');c.appendChild(d);}
function rmPI(idx){const e=document.getElementById('pr-'+idx);if(e)e.remove();}
function addC(idx){const name=document.getElementById('pn-'+idx)?.value.trim(),phone=document.getElementById('pp-'+idx)?.value.trim();if(!name&&!phone){toast('Ingresa datos');return;}const vc='BEGIN:VCARD\nVERSION:3.0\nFN:'+(name||'Contacto')+'\nTEL:'+(phone||'')+'\nEND:VCARD';const b=new Blob([vc],{type:'text/vcard'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=(name||'contacto')+'.vcf';a.click();URL.revokeObjectURL(u);toast('Descargando...');}
function saveParts(){const act=acts.find(a=>a.id===curActId);if(!act)return;const pay=document.getElementById('bulk-pay').value;const np=[];for(let i=1;i<=pCount;i++){const nEl=document.getElementById('pn-'+i);const pEl=document.getElementById('pp-'+i);if(!nEl)continue;const name=nEl.value.trim();if(!name)continue;np.push({name,phone:pEl?.value.trim()||'',payment:pay,abono:0});}act.participants=np;sv();CM('m-parts');openSD(curActId);toast(np.length+' guardado(s)');}
function openPd(actId,idx){curActId=actId;curPIdx=idx;const act=acts.find(a=>a.id===actId);const p=act.participants[idx];document.getElementById('pd-av').textContent=p.name.charAt(0).toUpperCase();document.getElementById('pd-nm').textContent=p.name;document.getElementById('pd-ph').textContent=p.phone||'Sin numero';document.getElementById('pd-wa').href=p.phone?'https://wa.me/'+p.phone.replace(/\D/g,''):'#';document.getElementById('pd-pay').value=p.payment;document.getElementById('pd-abono').value=p.abono||'';document.getElementById('pd-abono-field').style.display=p.payment==='partial'?'block':'none';document.getElementById('pd-del').onclick=()=>{act.participants.splice(idx,1);sv();CM('m-pd');openSD(actId);toast('Eliminada');};OM('m-pd');}
function updPd(){const act=acts.find(a=>a.id===curActId);const p=act.participants[curPIdx];p.payment=document.getElementById('pd-pay').value;p.abono=p.payment==='partial'?parseFloat(document.getElementById('pd-abono').value)||0:0;sv();CM('m-pd');openSD(curActId);toast('Actualizado');}

/* ===== COMBINACIONES ===== */
function renderCombos(){
  const c=document.getElementById('enamel-content');
  if(!combos.length){c.innerHTML='<div class="empty-st"><div class="ei">&#127752;</div><p>Sin combinaciones aun.<br>Toca + para crear una.</p></div>';return;}
  let h='<div class="eg">';
  combos.forEach(cb=>{
    const fondoE=ens.find(x=>x.id===cb.fondoId);
    const sobreE=ens.find(x=>x.id===cb.sobreId);
    // Thumbnail: preferir foto resultado, luego split de los dos esmaltes
    let thumbContent='';
    if(cb.resultImg){
      thumbContent='<img src="'+cb.resultImg+'" style="width:100%;height:100%;object-fit:cover">';
    } else {
      const imgF=fondoE?((fondoE.imgs&&fondoE.imgs[0])||fondoE.img||null):null;
      const imgS=sobreE?((sobreE.imgs&&sobreE.imgs[0])||sobreE.img||null):null;
      if(imgF||imgS){
        thumbContent='<div style="display:flex;width:100%;height:100%"><div style="flex:1;overflow:hidden">'+(imgF?'<img src="'+imgF+'" style="width:100%;height:100%;object-fit:cover">':'<div style="width:100%;height:100%;background:var(--sur3);display:flex;align-items:center;justify-content:center">&#127912;</div>')+'</div><div style="flex:1;overflow:hidden">'+(imgS?'<img src="'+imgS+'" style="width:100%;height:100%;object-fit:cover">':'<div style="width:100%;height:100%;background:var(--sur3);display:flex;align-items:center;justify-content:center">&#127912;</div>')+'</div></div>';
      } else {thumbContent='&#127752;';}
    }
    h+='<div class="ec" onclick="openComboDetail(\''+cb.id+'\')">';
    h+='<div class="et">'+thumbContent+'</div>';
    h+='<div class="ei2"><div class="en">'+cb.name+'</div><div class="es2">'+(fondoE?fondoE.brand:'?')+' + '+(sobreE?sobreE.brand:'?')+'</div></div></div>';
  });
  h+='<div class="aec" onclick="document.getElementById(\'fab\').click()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Agregar</div></div>';
  c.innerHTML=h;
}

function renderFin(){renderFinSum();renderFinContent();}
function renderFinSum(){const now=new Date().toISOString().slice(0,7);const mi=totIng(now);const mg=totGas(now);const ti=totIng(null);const tg=totGas(null);const s=mi-mg;document.getElementById('fin-summary-box').innerHTML='<div class="fin-summary"><div class="fin-summary-title">Resumen '+MONTHS[new Date().getMonth()]+' '+new Date().getFullYear()+'</div><div class="fin-row"><span class="fin-label">Ingresos del mes</span><span class="fin-val pos">'+FMT(mi)+'</span></div><div class="fin-row"><span class="fin-label">Gastos del mes</span><span class="fin-val neg">-'+FMT(mg)+'</span></div><div class="fin-row"><span class="fin-label" style="font-weight:600">Saldo del mes</span><span class="fin-val '+(s>=0?'pos':'neg')+'" style="font-size:1.1rem">'+FMT(s)+'</span></div><div class="fin-row"><span class="fin-label">Saldo acumulado</span><span class="fin-val neu">'+FMT(ti-tg)+'</span></div></div>';}
function renderFinContent(){const c=document.getElementById('fin-content');if(finTab==='mes'){const ms=new Set();fins.forEach(f=>ms.add(f.date.slice(0,7)));acts.forEach(a=>{if(a.date)ms.add(a.date.slice(0,7));});const keys=[...ms].sort().reverse();if(!keys.length){c.innerHTML='<div class="empty-st"><div class="ei">&#128176;</div><p>Sin movimientos.<br>Toca + para agregar.</p></div>';return;}let h='<div class="fin-list">';keys.forEach(mk=>{const [y,m]=mk.split('-');const lbl=MONTHS[parseInt(m)-1]+' '+y;const ing=totIng(mk);const gas=totGas(mk);const s=ing-gas;h+='<div class="fin-mh">'+lbl+'</div><div class="fin-summary" style="margin:0 0 12px;padding:12px"><div class="fin-row"><span class="fin-label">Ingresos</span><span class="fin-val pos">'+FMT(ing)+'</span></div><div class="fin-row"><span class="fin-label">Gastos</span><span class="fin-val neg">-'+FMT(gas)+'</span></div><div class="fin-row"><span class="fin-label">Saldo</span><span class="fin-val '+(s>=0?'pos':'neg')+'">'+FMT(s)+'</span></div></div>';});h+='</div>';c.innerHTML=h;}else if(finTab==='taller'){const tm={};acts.forEach(a=>{let t=0;(a.participants||[]).forEach(p=>{if(p.payment==='paid')t+=(a.price||0);else if(p.payment==='partial')t+=(p.abono||0);});if(t>0){if(!tm[a.name])tm[a.name]=0;tm[a.name]+=t;}});const ks=Object.keys(tm);if(!ks.length){c.innerHTML='<div class="empty-st"><div class="ei">&#127968;</div><p>Sin ingresos por taller.</p></div>';return;}let h='<div class="fin-list">';ks.forEach(k=>{h+='<div class="fin-item"><div class="fin-icon ing">&#127968;</div><div class="fin-info"><div class="fin-desc">'+k+'</div></div><span class="fin-amount ing">'+FMT(tm[k])+'</span></div>';});h+='</div>';c.innerHTML=h;}else{const type=finTab==='ingresos'?'ingreso':'gasto';const list=fins.filter(f=>f.type===type).sort((a,b)=>b.date.localeCompare(a.date));if(!list.length){c.innerHTML='<div class="empty-st"><div class="ei">&#128202;</div><p>Sin '+finTab+' aun.</p></div>';return;}let h='<div class="fin-list">';list.forEach(f=>{h+='<div class="fin-item" onclick="openFinDet(\''+f.id+'\')"><div class="fin-icon '+(type==='ingreso'?'ing':'gas')+'">'+(type==='ingreso'?'&#11014;':'&#11015;')+'</div><div class="fin-info"><div class="fin-desc">'+f.desc+'</div><div class="fin-date">'+f.date+' - '+f.cat+'</div></div><span class="fin-amount '+(type==='ingreso'?'ing':'gas')+'">'+(type==='ingreso'?'+':'-')+FMT(f.amount)+'</span></div>';});h+='</div>';c.innerHTML=h;}}
document.getElementById('fin-tabs').addEventListener('click',e=>{const btn=e.target.closest('.ftab');if(!btn)return;finTab=btn.dataset.ft;document.querySelectorAll('#fin-tabs .ftab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderFinContent();});
function saveFin(){const desc=document.getElementById('fin-desc').value.trim();const amount=parseFloat(document.getElementById('fin-amount').value);const date=document.getElementById('fin-date').value;if(!desc){toast('Ingresa descripcion');return;}if(!amount||amount<=0){toast('Monto invalido');return;}if(!date){toast('Selecciona fecha');return;}fins.push({id:Date.now().toString(),type:document.getElementById('fin-type').value,desc,cat:document.getElementById('fin-cat').value,amount,date,note:document.getElementById('fin-note').value.trim()});sv();CM('m-fin');renderFin();toast('Guardado');}
function openFinDet(id){const f=fins.find(x=>x.id===id);document.getElementById('fin-det-content').innerHTML='<h3>'+(f.type==='ingreso'?'Ingreso':'Gasto')+'</h3><div class="drow"><span class="dlbl">Descripcion</span><span class="dval">'+f.desc+'</span></div><div class="drow"><span class="dlbl">Monto</span><span class="dval fin-amount '+(f.type==='ingreso'?'ing':'gas')+'">'+(f.type==='ingreso'?'+':'-')+FMT(f.amount)+'</span></div><div class="drow"><span class="dlbl">Categoria</span><span class="dval">'+f.cat+'</span></div><div class="drow"><span class="dlbl">Fecha</span><span class="dval">'+f.date+'</span></div>'+(f.note?'<div class="drow"><span class="dlbl">Nota</span><span class="dval">'+f.note+'</span></div>':'');document.getElementById('fin-del-btn').onclick=()=>{if(!confirm('Eliminar?'))return;fins=fins.filter(x=>x.id!==id);sv();CM('m-fin-det');renderFin();toast('Eliminado');};OM('m-fin-det');}
window.addEventListener('load',()=>{setTimeout(()=>{const s=document.getElementById('splash');s.style.opacity='0';setTimeout(()=>s.style.display='none',600);},1600);renderCal();if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}});

</script></body></html>
