name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Clone and configure TWA
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa
          cd twa
          find . -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" -o -name "*.kt" \) -exec sed -i 's/art\.svgomg\.twa/com.amezclarte.app/g' {} + 2>/dev/null || true
          find . -type f \( -name "*.gradle" -o -name "*.xml" \) -exec sed -i 's/art.svgomg.twa/com.amezclarte.app/g' {} + 2>/dev/null || true
          find . -type f -name "*.xml" -exec sed -i 's|svgomg.firebaseapp.com|warm-bunny-1c316d.netlify.app|g' {} + 2>/dev/null || true
          find . -type f -name "*.xml" -exec sed -i 's|https://svgomg.firebaseapp.com|https://warm-bunny-1c316d.netlify.app|g' {} + 2>/dev/null || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate keystore
        run: keytool -genkey -v -keystore amezclarte.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass android123 -keypass android123 -dname "CN=Amezclarte,O=Amezclarte,C=CL"

      - name: Build APK
        working-directory: twa
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=../amezclarte.keystore -Pandroid.injected.signing.store.password=android123 -Pandroid.injected.signing.key.alias=android -Pandroid.injected.signing.key.password=android123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: amezclarte-apk
          path: twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
