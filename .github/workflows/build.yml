name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap JDK and SDK
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Init TWA project
        run: |
          mkdir twa && cd twa
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass android123 -keypass android123 -dname "CN=Amezclarte,O=Amezclarte,C=CL"
          bubblewrap init --manifest https://warm-bunny-1c316d.netlify.app/manifest.json --directory . \
            --packageId com.amezclarte.app \
            --name Amezclarte \
            --themeColor "#0a0a0a" \
            --backgroundColor "#0a0a0a" \
            --startUrl "/index.html" \
            --iconUrl "https://warm-bunny-1c316d.netlify.app/icon-512.png" \
            --maskableIconUrl "https://warm-bunny-1c316d.netlify.app/icon-maskable.png" \
            --signingKeyPath ./android.keystore \
            --signingKeyAlias android

      - name: Build APK with Gradle
        working-directory: twa
        run: |
          ./gradlew assembleRelease -Pandroid.injected.signing.store.file=android.keystore -Pandroid.injected.signing.store.password=android123 -Pandroid.injected.signing.key.alias=android -Pandroid.injected.signing.key.password=android123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: amezclarte-apk
          path: twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
